<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="en"> <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>Links - GPUL</title>
    <link rel="icon" type="image/x-icon" href="https://gpul.org/_astro/logo.BisyB_iF_DFKqE.svg">

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="Replace this with your own, this appears in search results and when sharing.">

    <!-- Keywords -->
    <meta name="keywords" content="GPUL">

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://links.gpul.org">

    <!-- Author Information -->
    <meta name="author" content="Grupo de Programadores e Usuarios de Linux">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->

  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <img class="avatar avatar--none" src="https://gpul.org/_astro/logo.BisyB_iF_DFKqE.svg" alt="LittleLink">

            <!-- Replace with your name or brand -->
            <h1>
              <div>GPUL</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p>Grupo de Programadores e Usuarios de Linux.</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">
              <!-- Generic Website -->
              <a class="button button-default" href="https://gpul.org" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-website.svg" alt="Website Icon">A nosa web</a>
              
              <br><br>
              
              <!-- Mastodon -->
              <a class="button button-mastodon" href="https://mastodon.social/@gpul_" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/mastodon.svg" alt="Mastodon Logo">Mastodon</a>
              <!-- Bluesky -->
              <a class="button button-bluesky" href="https://bsky.app/profile/gpul.org" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/bluesky.svg" alt="Bluesky Logo">Bluesky</a>
              <!-- Instagram -->
              <a class="button button-instagram" href="https://www.instagram.com/gpul_/" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">Instagram</a>
              <!-- LinkedIn -->
              <a class="button button-linked" href="https://www.linkedin.com/company/gpul" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/linkedin.svg" alt="LinkedIn Logo">LinkedIn</a>
              <!-- X -->
              <a class="button button-x" href="https://x.com/gpul_" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/x.svg" alt="X Logo">Follow on X</a>
              
              <br><br>
              
              <!-- GitHub -->
              <a class="button button-github" href="https://github.com/gpul-org" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/github.svg" alt="GitHub Logo">GitHub</a>
              <!-- Meetup -->
              <a class="button button-meetup-alt" href="https://www.meetup.com/gpul-labs/" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/meetup-alt.svg" alt="Meetup Logo">Meetup</a>
              
              <br><br>
          
              <!-- YouTube -->
              <a class="button button-yt" href="https://youtube.com/@gpul_coruna" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/youtube.svg" alt="YouTube Logo">YouTube</a>
              <!-- Twitch -->
              <a class="button button-twitch" href="https://www.twitch.tv/gpul_" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/twitch.svg" alt="Twitch Logo">Twitch</a>

              <br><br>
              <!-- Generic RSS -->
              <a class="button button-default" href="https://gpul.org/rss/eventos.xml" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-rss.svg" alt="RSS Icon">RSS de eventos</a>
              <!-- Generic RSS -->
              <a class="button button-default" href="https://gpul.org/rss/novas.xml" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-rss.svg" alt="RSS Icon">RSS de novas</a>
              
              
      </div>

      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <!--<a href="privacy.html">Privacy Policy</a> | -->Feito con <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
      </footer>

    </div>
  </div>

</body>

</html>
